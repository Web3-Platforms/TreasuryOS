apiVersion: apps/v1
kind: Deployment
metadata:
  name: treasuryos-dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: treasuryos-dashboard
  template:
    metadata:
      labels:
        app: treasuryos-dashboard
    spec:
      containers:
        - name: dashboard
          image: treasuryos/dashboard:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_BASE_URL
              value: "https://api.treasuryos.example"
