apiVersion: apps/v1
kind: Deployment
metadata:
  name: treasuryos-api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: treasuryos-api-gateway
  template:
    metadata:
      labels:
        app: treasuryos-api-gateway
    spec:
      containers:
        - name: api-gateway
          image: treasuryos/api-gateway:latest
          ports:
            - containerPort: 3001
          env:
            - name: API_GATEWAY_PORT
              value: "3001"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
