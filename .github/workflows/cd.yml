name: TreasuryOS CD

on:
  push:
    branches:
      - main

jobs:
  # ── Deploy API gateway to Railway ────────────────────────────────────────
  deploy-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --include=dev

      - name: Validate Railway deploy secret
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${RAILWAY_TOKEN:-}" ]; then
            echo "Missing RAILWAY_TOKEN GitHub Actions secret. Add a Railway Project Token in repository Settings -> Secrets and variables -> Actions." >&2
            exit 1
          fi

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service '@treasuryos/api-gateway' --detach

  # ── Run migrations against Neon after code deploy ────────────────────────
  migrate-neon:
    needs: deploy-api
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch enough history so we can diff against the push base
          fetch-depth: 0

      - name: Check whether migration files changed
        id: migration-check
        run: |
          # On the very first push BEFORE is the null SHA — treat as no-op to avoid git errors.
          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep '^infra/db/migrations/' || true)
          echo "changed=${CHANGED}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        if: steps.migration-check.outputs.changed != ''
        with:
          node-version: 22
          cache: npm

      - name: Validate Neon migration secret
        if: steps.migration-check.outputs.changed != ''
        env:
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: |
          set -euo pipefail
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "Missing NEON_DATABASE_URL GitHub Actions secret. Add it in repository Settings -> Secrets and variables -> Actions." >&2
            exit 1
          fi

      - run: sudo apt-get update && sudo apt-get install -y postgresql-client
        if: steps.migration-check.outputs.changed != ''

      - run: npm ci --include=dev
        if: steps.migration-check.outputs.changed != ''

      - name: Run migrations against Neon
        if: steps.migration-check.outputs.changed != ''
        env:
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: npm run db:migrate

      - name: Verify no pending migrations
        if: steps.migration-check.outputs.changed != ''
        env:
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: npm run db:migrate:check

  # ── Deploy landing page to Vercel ─────────────────────────────────────────
  deploy-landing:
    needs: deploy-api
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Validate Vercel landing-page secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_LANDING_PROJECT_ID: ${{ secrets.VERCEL_LANDING_PROJECT_ID }}
        run: |
          set -euo pipefail
          if [ -z "${VERCEL_TOKEN:-}" ] || [ -z "${VERCEL_ORG_ID:-}" ] || [ -z "${VERCEL_LANDING_PROJECT_ID:-}" ]; then
            echo "Missing one or more Vercel secrets (VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_LANDING_PROJECT_ID)." >&2
            echo "Add them in repository Settings -> Secrets and variables -> Actions." >&2
            exit 1
          fi

      - name: Trigger Vercel production deployment via API
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_LANDING_PROJECT_ID: ${{ secrets.VERCEL_LANDING_PROJECT_ID }}
        run: |
          set -euo pipefail
          # Trigger Vercel to deploy from the current git SHA.
          # Vercel clones the full monorepo on their servers so installCommand
          # ("cd ../.. && npm ci") works correctly — no local build needed.
          curl -fsS -X POST \
            "https://api.vercel.com/v13/deployments?teamId=${VERCEL_ORG_ID}&forceNew=1" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"name\": \"landing-page\",
              \"target\": \"production\",
              \"projectId\": \"${VERCEL_LANDING_PROJECT_ID}\",
              \"gitSource\": {
                \"type\": \"github\",
                \"repoId\": ${{ github.repository_id }},
                \"ref\": \"main\",
                \"sha\": \"${{ github.sha }}\"
              }
            }" | python3 -c "
import json, sys
d = json.load(sys.stdin)
if 'error' in d:
    print('Vercel error:', d['error'].get('message', d['error']), file=sys.stderr)
    sys.exit(1)
print('Deployment triggered:', d.get('url', 'no url'), '| id:', d.get('id', 'no id'))
"
