name: TreasuryOS CD

on:
  push:
    branches:
      - main

jobs:
  # ── Deploy API gateway to Railway ────────────────────────────────────────
  deploy-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --include=dev

      - name: Validate Railway deploy secret
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${RAILWAY_TOKEN:-}" ]; then
            echo "Missing RAILWAY_TOKEN GitHub Actions secret. Add a Railway Project Token in repository Settings -> Secrets and variables -> Actions." >&2
            exit 1
          fi

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service '@treasuryos/api-gateway' --detach

  # ── Run migrations against Neon after code deploy ────────────────────────
  migrate-neon:
    needs: deploy-api
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch enough history so we can diff against the push base
          fetch-depth: 0

      - name: Check whether migration files changed
        id: migration-check
        run: |
          # On the very first push BEFORE is the null SHA — treat as no-op to avoid git errors.
          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep '^infra/db/migrations/' || true)
          echo "changed=${CHANGED}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        if: steps.migration-check.outputs.changed != ''
        with:
          node-version: 22
          cache: npm

      - name: Validate Neon migration secret
        if: steps.migration-check.outputs.changed != ''
        env:
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: |
          set -euo pipefail
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "Missing NEON_DATABASE_URL GitHub Actions secret. Add it in repository Settings -> Secrets and variables -> Actions." >&2
            exit 1
          fi

      - run: sudo apt-get update && sudo apt-get install -y postgresql-client
        if: steps.migration-check.outputs.changed != ''

      - run: npm ci --include=dev
        if: steps.migration-check.outputs.changed != ''

      - name: Run migrations against Neon
        if: steps.migration-check.outputs.changed != ''
        env:
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: npm run db:migrate

      - name: Verify no pending migrations
        if: steps.migration-check.outputs.changed != ''
        env:
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: npm run db:migrate:check

  # ── Deploy landing page to Vercel ─────────────────────────────────────────
  deploy-landing:
    needs: deploy-api
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Validate deploy hook secret
        env:
          VERCEL_LANDING_DEPLOY_HOOK: ${{ secrets.VERCEL_LANDING_DEPLOY_HOOK }}
        run: |
          set -euo pipefail
          if [ -z "${VERCEL_LANDING_DEPLOY_HOOK:-}" ]; then
            echo "Missing VERCEL_LANDING_DEPLOY_HOOK GitHub Actions secret." >&2
            echo "Create a Deploy Hook in the Vercel landing-page project:" >&2
            echo "  Project Settings → Git → Deploy Hooks → Add Hook (branch: main)" >&2
            echo "Then add the hook URL as VERCEL_LANDING_DEPLOY_HOOK in repository Secrets." >&2
            exit 1
          fi

      - name: Trigger Vercel landing-page deployment
        env:
          VERCEL_LANDING_DEPLOY_HOOK: ${{ secrets.VERCEL_LANDING_DEPLOY_HOOK }}
        run: |
          set -euo pipefail
          RESPONSE=$(curl -fsS -X POST "${VERCEL_LANDING_DEPLOY_HOOK}")
          echo "Deploy triggered: $(echo "$RESPONSE" | jq -r '.job.id // "ok"')"
