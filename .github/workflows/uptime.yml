name: TreasuryOS Uptime

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: treasuryos-uptime
  cancel-in-progress: false

env:
  APP_URL: https://treasuryos.aicustombot.net
  APP_LOGIN_URL: https://treasuryos.aicustombot.net/login
  API_HEALTH_URL: https://api.treasuryos.aicustombot.net/api/health
  BROWSER_UA: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/135.0.0.0 Safari/537.36

jobs:
  uptime:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check dashboard redirect and login page
        run: |
          set -euo pipefail
          root_headers="$(mktemp)"
          login_headers="$(mktemp)"
          login_body="$(mktemp)"
          trap 'rm -f "$root_headers" "$login_headers" "$login_body"' EXIT

          curl -sS --max-time 20 \
            -A "$BROWSER_UA" \
            -H 'Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8' \
            -H 'Accept-Language: en-US,en;q=0.9' \
            -D "$root_headers" \
            -o /dev/null \
            "$APP_URL"

          cat "$root_headers"

          if grep -qi '^cf-mitigated: challenge' "$root_headers"; then
            echo 'Cloudflare challenged the root request; validating the direct login page instead.'
          else
            grep -E '^HTTP/[0-9.]+ 307|^HTTP/2 307' "$root_headers"
            grep -i '^location: /login' "$root_headers"
          fi

          curl -sS --max-time 20 \
            -A "$BROWSER_UA" \
            -H 'Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8' \
            -H 'Accept-Language: en-US,en;q=0.9' \
            -D "$login_headers" \
            -o "$login_body" \
            "$APP_LOGIN_URL"

          cat "$login_headers"
          grep -E '^HTTP/[0-9.]+ 200|^HTTP/2 200' "$login_headers"
          grep -q 'TreasuryOS Pilot Login' "$login_body"

      - name: Check API health
        run: |
          set -euo pipefail
          response="$(curl -fsSL --max-time 20 "$API_HEALTH_URL")"
          echo "$response"
          node -e 'const payload = JSON.parse(process.argv[1]); if (payload.status !== "ok") { throw new Error(`Unexpected API status: ${payload.status}`); }' "$response"

      - name: Create or update failure issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = '[Launch] Uptime check failed';
            const body = [
              'A scheduled TreasuryOS uptime check failed.',
              '',
              `Run: ${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`,
              `App URL: ${process.env.APP_URL}`,
              `API health URL: ${process.env.API_HEALTH_URL}`,
              `Triggered by: ${context.eventName}`,
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });

            const existing = issues.find((issue) => issue.title === title);

            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
              });
            }
